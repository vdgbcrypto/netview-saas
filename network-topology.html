<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Topology Visualization</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0a0e17;
  color: #e0e6f0;
  overflow: hidden;
  height: 100vh;
}
#app { display: flex; height: 100vh; }

#sidebar {
  width: 320px;
  background: #111827;
  border-right: 1px solid #1e293b;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#sidebar-header {
  padding: 16px;
  border-bottom: 1px solid #1e293b;
}
#sidebar-header h1 {
  font-size: 16px;
  font-weight: 600;
  color: #60a5fa;
  margin-bottom: 4px;
}
#sidebar-header p {
  font-size: 12px;
  color: #64748b;
}

#stats-bar {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 12px 16px;
  border-bottom: 1px solid #1e293b;
}
.stat-card {
  background: #1e293b;
  border-radius: 6px;
  padding: 8px 10px;
}
.stat-value {
  font-size: 20px;
  font-weight: 700;
  color: #60a5fa;
}
.stat-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #64748b;
  margin-top: 2px;
}

#device-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.device-item {
  padding: 10px 12px;
  border-radius: 6px;
  cursor: pointer;
  margin-bottom: 2px;
  transition: background 0.15s;
  border: 1px solid transparent;
}
.device-item:hover {
  background: #1e293b;
}
.device-item.selected {
  background: #1e293b;
  border-color: #3b82f6;
}
.device-ip {
  font-size: 13px;
  font-weight: 600;
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
}
.device-type {
  font-size: 11px;
  color: #64748b;
  margin-top: 2px;
}
.device-badge {
  display: inline-block;
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 3px;
  font-weight: 600;
  text-transform: uppercase;
  margin-left: 6px;
  vertical-align: middle;
}

#detail-panel {
  width: 360px;
  background: #111827;
  border-left: 1px solid #1e293b;
  padding: 20px;
  overflow-y: auto;
  display: none;
}
#detail-panel.visible { display: block; }
#detail-panel h2 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 4px;
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
}
#detail-panel .subtitle {
  font-size: 12px;
  color: #64748b;
  margin-bottom: 16px;
}
.detail-section {
  margin-bottom: 16px;
}
.detail-section h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: #64748b;
  margin-bottom: 8px;
}
.detail-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid #1e293b;
  font-size: 13px;
}
.detail-row .label { color: #94a3b8; }
.detail-row .value { font-family: 'JetBrains Mono', 'Fira Code', monospace; color: #e0e6f0; }

.port-list {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.port-tag {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 4px;
  padding: 3px 8px;
  font-size: 11px;
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
}

#graph-container {
  flex: 1;
  position: relative;
  background: #0a0e17;
}
#graph-svg {
  width: 100%;
  height: 100%;
}

#toolbar {
  position: absolute;
  top: 16px;
  right: 16px;
  display: flex;
  gap: 8px;
  z-index: 10;
}
.toolbar-btn {
  background: #1e293b;
  border: 1px solid #334155;
  color: #e0e6f0;
  border-radius: 6px;
  padding: 8px 12px;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.15s;
}
.toolbar-btn:hover {
  background: #334155;
  border-color: #475569;
}
.toolbar-btn.active {
  background: #1e40af;
  border-color: #3b82f6;
}

#legend {
  position: absolute;
  bottom: 16px;
  left: 16px;
  background: rgba(17, 24, 39, 0.9);
  border: 1px solid #1e293b;
  border-radius: 8px;
  padding: 12px;
  z-index: 10;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
  font-size: 11px;
}
.legend-item:last-child { margin-bottom: 0; }
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

#search-box {

  border-bottom: 1px solid #1e293b;
}
#search-input {

  color: #e0e6f0;
  font-size: 13px;

}

  height: 8px;

  display: inline-block;
  margin-right: 6px;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #475569; }
</style>

  'Server': '#3b82f6',
  'Network Equipment': '#f59e0b',
  'Workstation': '#10b981',
  'Mobile': '#8b5cf6',
  'Printer': '#ec4899',
  'IoT': '#06b6d4',
  'Unknown': '#64748b'
};

const portServiceMap = {
  22: 'SSH', 23: 'Telnet', 53: 'DNS', 80: 'HTTP', 110: 'POP3',
  111: 'RPC', 139: 'NetBIOS', 143: 'IMAP', 443: 'HTTPS', 445: 'SMB',
  500: 'ISAKMP', 548: 'AFP', 993: 'IMAPS', 995: 'POP3S',
  1433: 'MSSQL', 1521: 'Oracle', 3306: 'MySQL', 3389: 'RDP',
  5000: 'UPnP', 5001: 'HTTPS-Alt', 548: 'AFP', 8080: 'HTTP-Alt',
  8081: 'HTTP-Alt2', 8443: 'HTTPS-Alt', 9090: 'Web-Console',
  2049: 'NFS'
};

function classifyDevice(d) {
  const ports = d.open_ports || [];
  if (ports.includes(80) && ports.includes(443) && ports.includes(53)) return 'Network Equipment';
  if (ports.includes(22) && (ports.includes(445) || ports.includes(2049) || ports.includes(111))) return 'Server';
  if (ports.includes(3389) || (ports.includes(445) && ports.length <= 3)) return 'Workstation';
  if (ports.includes(5000) || ports.includes(8080) || ports.includes(9090)) return 'Network Equipment';
  if (ports.includes(80) && ports.includes(443)) return 'Server';
  if (ports.length === 0) return 'Mobile';
  if (ports.length <= 2) return 'IoT';
  return 'Unknown';
}

function getSubnet(ip) {
  const parts = ip.split('.');
  return parts.slice(0, 3).join('.') + '.0/24';
}

const devices = scanData.devices.map(d => {
  const type = classifyDevice(d);
  return {
    ...d,
    device_type: type,
    subnet: getSubnet(d.ip),
    ports: d.open_ports || []
  };
});

const subnets = [...new Set(devices.map(d => d.subnet))];
const subnetColors = d3.scaleOrdinal(d3.schemeTableau10).domain(subnets);

// Build links: connect devices in same subnet, connect routers to each other
const links = [];
const routers = devices.filter(d => d.device_type === 'Network Equipment');

// Connect all devices in same subnet (star topology from router)
subnets.forEach(subnet => {
  const subnetDevices = devices.filter(d => d.subnet === subnet);
  const router = subnetDevices.find(d => d.device_type === 'Network Equipment');
  if (router) {
    subnetDevices.filter(d => d !== router).forEach(d => {
      links.push({ source: router.ip, target: d.ip, type: 'subnet' });
    });
  } else {
    // No router - connect devices to each other in a chain
    for (let i = 1; i < subnetDevices.length; i++) {
      links.push({ source: subnetDevices[0].ip, target: subnetDevices[i].ip, type: 'subnet' });
    }
  }
});

// Connect routers to each other (backbone)
for (let i = 0; i < routers.length - 1; i++) {
  links.push({ source: routers[i].ip, target: routers[i+1].ip, type: 'backbone' });
}

document.getElementById('stat-servers').textContent = devices.filter(d => d.device_type === 'Server').length;
document.getElementById('stat-network').textContent = devices.filter(d => d.device_type === 'Network Equipment').length;

Object.entries(deviceTypeColors).forEach(([type, color]) => {

});

// Zoom
const zoom = d3.zoom()
  .scaleExtent([0.2, 5])
  .on('zoom', (event) => g.attr('transform', event.transform));
svg.call(zoom);

// Physics simulation
let simulation = d3.forceSimulation(devices)
  .force('link', d3.forceLink(links).id(d => d.ip).distance(d => d.type === 'backbone' ? 200 : 80).strength(d => d.type === 'backbone' ? 0.7 : 0.3))
  .force('charge', d3.forceManyBody().strength(-300))
  .force('center', d3.forceCenter(width / 2, height / 2))
  .force('collision', d3.forceCollide().radius(30));

// Links
const link = g.append('g')
  .selectAll('line')
  .data(links)
  .join('line')
  .attr('stroke', d => d.type === 'backbone' ? '#f59e0b' : '#334155')
  .attr('stroke-width', d => d.type === 'backbone' ? 2 : 1)
  .attr('stroke-dasharray', d => d.type === 'backbone' ? 'none' : '4,4')
  .attr('opacity', 0.6);

// Nodes
const node = g.append('g')
  .selectAll('g')
  .data(devices)
  .join('g')
  .attr('class', 'node-group')
  .call(d3.drag()
    .on('start', dragstarted)
    .on('drag', dragged)
    .on('end', dragended))
  .on('click', (event, d) => showDetails(d))
  .on('mouseenter', (event, d) => highlightNode(d))
  .on('mouseleave', () => unhighlightNode());

// Node circles
node.append('circle')
  .attr('r', d => {
    if (d.device_type === 'Network Equipment') return 18;
    if (d.device_type === 'Server') return 14;
    if (d.device_type === 'Unknown') return 10;
    return 12;
  })
  .attr('fill', d => deviceTypeColors[d.device_type] || '#64748b')
  .attr('stroke', '#0f172a')
  .attr('stroke-width', 2)
  .attr('opacity', 0.9);

// Node icons (emoji-style text)
node.append('text')
  .attr('text-anchor', 'middle')
  .attr('dy', '0.35em')
  .attr('font-size', d => d.device_type === 'Network Equipment' ? '12px' : '10px')
  .attr('fill', '#fff')
  .attr('pointer-events', 'none')
  .text(d => {
    if (d.device_type === 'Network Equipment') return '\u{1F4E1}';
    if (d.device_type === 'Server') return '\u{1F5C4}';
    if (d.device_type === 'Workstation') return '\u{1F4BB}';
    if (d.device_type === 'Mobile') return '\u{1F4F1}';
    if (d.device_type === 'Printer') return '\u{1F5A8}';
    if (d.device_type === 'IoT') return '\u{1F4A1}';
    return '\u{2753}';
  });

// Labels
let labelsVisible = false;
const label = node.append('text')
  .attr('class', 'node-label')
  .attr('text-anchor', 'middle')
  .attr('dy', d => d.device_type === 'Network Equipment' ? -28 : -22)
  .attr('font-size', '10px')
  .attr('fill', '#94a3b8')
  .attr('pointer-events', 'none')
  .attr('opacity', labelsVisible ? 1 : 0)
  .text(d => d.hostname || d.ip);

// Tick
simulation.on('tick', () => {
  link
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);
  node.attr('transform', d => `translate(${d.x},${d.y})`);
});

// Drag
function dragstarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x;
  d.fy = d.y;
}
function dragged(event, d) {
  d.fx = event.x;
  d.fy = event.y;
}
function dragended(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null;
  d.fy = null;
}

// Highlight
function highlightNode(d) {
  node.select('circle').attr('opacity', n => {
    if (n === d) return 1;
    const isConnected = links.some(l => 
      (l.source.ip === d.ip && l.target.ip === n.ip) || 
      (l.target.ip === d.ip && l.source.ip === n.ip)
    );
    return isConnected ? 0.8 : 0.2;
  });
  link.attr('opacity', l => 
    (l.source.ip === d.ip || l.target.ip === d.ip) ? 1 : 0.1
  );
}

function unhighlightNode() {
  node.select('circle').attr('opacity', 0.9);
  link.attr('opacity', 0.6);
}

// Device list
const deviceListEl = document.getElementById('device-list');
function renderDeviceList(filter = '') {
  const filtered = devices.filter(d => 
    d.ip.includes(filter) || 
    (d.hostname && d.hostname.toLowerCase().includes(filter.toLowerCase())) ||
    (d.mac && d.mac.toLowerCase().includes(filter.toLowerCase()))
  );
  
  deviceListEl.innerHTML = filtered.map(d => {
    const color = deviceTypeColors[d.device_type] || '#64748b';
    return `<div class="device-item" data-ip="${d.ip}" onclick="selectDevice('${d.ip}')">
      <div class="device-ip">
        <span class="device-type-icon" style="background:${color}"></span>
        ${d.ip}
        <span class="device-badge" style="background:${color}20;color:${color}">${d.device_type}</span>
      </div>
      <div class="device-type">${d.hostname || 'No hostname'} &middot; ${d.ports.length} ports</div>
    </div>`;
  }).join('');
}
renderDeviceList();

document.getElementById('search-input').addEventListener('input', e => {
  renderDeviceList(e.target.value);
});

window.selectDevice = function(ip) {
  const d = devices.find(dev => dev.ip === ip);
  if (d) showDetails(d);
};

function showDetails(d) {
  document.getElementById('detail-panel').classList.add('visible');
  document.getElementById('detail-ip').textContent = d.ip;
  document.getElementById('detail-type').textContent = `${d.device_type} — ${d.vendor}`;
  document.getElementById('detail-hostname').textContent = d.hostname || '—';
  document.getElementById('detail-mac').textContent = d.mac || '—';
  document.getElementById('detail-vendor').textContent = d.vendor || '—';
  document.getElementById('detail-source').textContent = d.source || '—';
  document.getElementById('detail-subnet').textContent = d.subnet;
  
  const portsEl = document.getElementById('detail-ports');
  portsEl.innerHTML = d.ports.length > 0 
    ? d.ports.map(p => `<span class="port-tag">${p} (${portServiceMap[p] || 'Unknown'})</span>`).join('')
    : '<span style="color:#64748b;font-size:12px">No open ports detected</span>';
  
  // Highlight in list
  document.querySelectorAll('.device-item').forEach(el => {
    el.classList.toggle('selected', el.dataset.ip === d.ip);
  });
}

// Toolbar
document.getElementById('btn-zoom-in').addEventListener('click', () => {
  svg.transition().duration(300).call(zoom.scaleBy, 1.4);
});
document.getElementById('btn-zoom-out').addEventListener('click', () => {
  svg.transition().duration(300).call(zoom.scaleBy, 0.7);
});
document.getElementById('btn-reset').addEventListener('click', () => {
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
});

let physicsEnabled = true;
document.getElementById('btn-physics').addEventListener('click', function() {
  physicsEnabled = !physicsEnabled;
  this.classList.toggle('active', physicsEnabled);
  if (physicsEnabled) {
    simulation.alpha(0.3).restart();
  } else {
    simulation.stop();
  }
});

document.getElementById('btn-labels').addEventListener('click', function() {
  labelsVisible = !labelsVisible;
  this.classList.toggle('active', labelsVisible);
  label.transition().duration(200).attr('opacity', labelsVisible ? 1 : 0);
});

// Resize
window.addEventListener('resize', () => {
  width = container.clientWidth;
  height = container.clientHeight;
  svg.attr('width', width).attr('height', height);
  simulation.force('center', d3.forceCenter(width / 2, height / 2));
  simulation.alpha(0.3).restart();
});
</script>
</body>
</html>
